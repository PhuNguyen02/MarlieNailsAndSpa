version: '3.8'

services:
  # ---- MySQL Database ----
  mysql:
    image: mysql:8.0
    container_name: marlie-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-spa_db}
      MYSQL_USER: ${DB_USERNAME:-spa_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-spa_password}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DB_ROOT_PASSWORD:-rootpassword}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # ---- Backend API (NestJS) ----
  backend:
    build:
      context: ./backEnd
      dockerfile: Dockerfile
    container_name: marlie-backend
    ports:
      - '8080:8080'
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=${DB_USERNAME:-spa_user}
      - DB_PASSWORD=${DB_PASSWORD:-spa_password}
      - DB_DATABASE=${DB_NAME:-spa_db}
      - JWT_SECRET=${JWT_SECRET:-marlie-spa-secret-key-2026-change-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - FRONTEND_URL=https://marliespa.com
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads
    networks:
      - app-network

  # ---- Frontend SPA ----
  frontend:
    build:
      context: ./frontEnd
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: marlie-frontend
    ports:
      - '3000:80'
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  # ---- Nginx Proxy Manager ----
  nginx-proxy:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - app-network

volumes:
  mysql_data:
  uploads_data:
  npm_data:
  npm_letsencrypt:

networks:
  app-network:
    driver: bridge
